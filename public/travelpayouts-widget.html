<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyVoyAI Travel Search</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 420px;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: block;
      }

      #tp-widget-root {
        width: 100%;
        min-height: 420px;
      }
    </style>
  </head>
  <body>
    <div id="tp-widget-root">
      <script>
        (function () {
          var messageType = "travelpayouts-widget:resize";
          var targetOrigin = window.location.origin;

          var postHeight = function () {
            var height = Math.max(
              420,
              document.documentElement.scrollHeight,
              document.body.scrollHeight,
              document.documentElement.offsetHeight,
              document.body.offsetHeight,
              document.documentElement.clientHeight,
              document.body.clientHeight
            );

            parent.postMessage({ type: messageType, height: height + 12 }, targetOrigin);
          };

          var queueHeight = function () {
            window.requestAnimationFrame(postHeight);
          };

          window.addEventListener("load", function () {
            queueHeight();
            window.setTimeout(queueHeight, 250);
            window.setTimeout(queueHeight, 1000);
            window.setTimeout(queueHeight, 2500);
          });

          new MutationObserver(queueHeight).observe(document.documentElement, {
            childList: true,
            subtree: true,
            attributes: true,
          });

          if ("ResizeObserver" in window) {
            var resizeObserver = new ResizeObserver(queueHeight);
            resizeObserver.observe(document.documentElement);
            resizeObserver.observe(document.body);
          }
        })();
      </script>
      <script
        async
        src="https://tpscr.com/content?currency=aed&trs=515371&shmarker=716584&show_hotels=true&powered_by=true&locale=en&searchUrl=www.aviasales.com%2Fsearch&primary_override=%230057FF&color_button=%230057FF&color_icons=%2300D4FF&dark=%23FFFFFF&light=%230A1228&secondary=%23050A1A&special=%23ba255255&color_focused=%233D7FFF&border_radius=0&no_labels=&plain=true&promo_id=7879&campaign_id=100"
        charset="utf-8"
      ></script>
    </div>
  </body>
</html>
